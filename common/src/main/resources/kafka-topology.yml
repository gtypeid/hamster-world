services:
  - name: ecommerce-service
    description: E-commerce 서비스 (주문, 상품 관리)
    owns:
      - ecommerce-events

  - name: payment-service
    description: Payment 서비스 (재고 관리, 결제 검증)
    owns:
      - payment-events

  - name: cash-gateway-service
    description: Cash Gateway 서비스 (PG 연동)
    owns:
      - cash-gateway-events

  - name: hamster-pg-service
    description: Hamster PG 서비스 (외부 PG, 참고용)
    owns: []

  - name: progression-service
    description: Progression 서비스 (Archive, Quota 관리)
    owns:
      - progression-events

  - name: notification-service
    description: Notification 서비스 (DLQ 관리, Discord/Slack 알림)
    owns: []

topics:
  - name: ecommerce-events
    partitions: 3
    replication-factor: 1
    description: E-commerce Service 이벤트 (상품 생성, 재고 조정 요청, 주문 생성)

  - name: payment-events
    partitions: 3
    replication-factor: 1
    description: Payment Service 이벤트 (재고 확보 완료, 재고 동기화)

  - name: cash-gateway-events
    partitions: 3
    replication-factor: 1
    description: Cash Gateway Service 이벤트 (결제 승인, 실패, 취소)

  - name: progression-events
    partitions: 3
    replication-factor: 1
    description: Progression Service 이벤트 (Archive 완료/클레임, Quota 완료/클레임)

  - name: ecommerce-events-dlt
    partitions: 3
    replication-factor: 1
    description: E-commerce Service DLT (KafkaErrorHandler에서 자동 전송)

  - name: payment-events-dlt
    partitions: 3
    replication-factor: 1
    description: Payment Service DLT (KafkaErrorHandler에서 자동 전송)

  - name: cash-gateway-events-dlt
    partitions: 3
    replication-factor: 1
    description: Cash Gateway Service DLT (KafkaErrorHandler에서 자동 전송)

  - name: progression-events-dlt
    partitions: 3
    replication-factor: 1
    description: Progression Service DLT (KafkaErrorHandler에서 자동 전송)
