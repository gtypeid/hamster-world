spring:
  application:
    name: cash-gateway-service

  config:
    import:
      - classpath:application-kafka.yml
      - classpath:application-oauth2.yml
      - classpath:application-monitoring.yml
      - classpath:kafka-topology.yml
      - classpath:kafka-event-registry.yml

  datasource:
    url: jdbc:mysql://localhost:3307/cash_gateway_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: 12555!@
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true

server:
  port: 8082

logging:
  level:
    root: INFO
    com.hamsterworld.payment: DEBUG
    org.hibernate.SQL: info
    org.hibernate.type.descriptor.sql.BasicBinder: info
    org.springframework.security: DEBUG

payment:
  gateway:
    dummy-pg:
      url: http://localhost:8083
      timeout: 5000
      default-pg-mid: hamster_dummy_mid_001
    retry:
      maxAttempts: 3
      backoffDelay: 1000
    polling:
      enabled: true
      fixedDelay: 5000
      initialDelay: 10000
      batchSize: 10

outbox:
  processor:
    enabled: true
